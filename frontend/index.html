<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetroStream</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #1a1a2e;
      border-bottom: 2px solid #e94560;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    header h1 {
      font-size: 1.4rem;
      color: #e94560;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    #session-badge {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.75rem;
      color: #a0a0c0;
    }
    .header-btn {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #a0a0c0;
      padding: 5px 12px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .header-btn:hover { border-color: #e94560; color: #e94560; }
    #connection-status {
      margin-left: auto;
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      font-family: inherit;
      cursor: default;
    }
    #connection-status.connected    { border-color: #00ff88; color: #00ff88; cursor: pointer; }
    #connection-status.connected:hover { background: rgba(0,255,136,0.1); }
    #connection-status.connecting   { border-color: #ffa500; color: #ffa500; }
    #connection-status.disconnected { border-color: #e94560; color: #e94560; }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 260px;
      grid-template-rows: 1fr;
      gap: 0;
      overflow: hidden;
    }

    /* ── Game screen ── */
    #game-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
    }
    #game-canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #1a1a2e;
      width: min(80vw, calc(80vh * 1.14));
      height: auto;
      background: #111;
    }
    #overlay-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #fff;
      font-size: 1.1rem;
    }
    #overlay-message .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Side panel ── */
    #side-panel {
      background: #111;
      border-left: 1px solid #222;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-section {
      border-bottom: 1px solid #222;
      padding: 12px;
    }
    .panel-section h3 {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* Players */
    #player-list { display: flex; flex-direction: column; gap: 4px; }
    .player-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      padding: 4px 6px;
      border-radius: 4px;
      background: #1a1a1a;
    }
    .player-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
    }
    .player-dot.active { background: #00ff88; }
    .player-dot.you    { background: #e94560; }

    /* Memory watch */
    #memory-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .mem-cell {
      background: #1a1a1a;
      border-radius: 4px;
      padding: 6px;
    }
    .mem-cell .label {
      font-size: 0.65rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .mem-cell .value {
      font-size: 1.1rem;
      color: #00ff88;
      font-weight: bold;
    }
    .mem-cell .value.changed {
      color: #ffa500;
      animation: flash 0.4s ease;
    }
    @keyframes flash { 0%,100% { opacity:1 } 50% { opacity:0.3 } }
    #no-memory-msg { font-size: 0.75rem; color: #444; font-style: italic; }

    /* Chat */
    #chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 12px;
    }
    #chat-panel h3 {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    .chat-msg {
      font-size: 0.78rem;
      line-height: 1.4;
      word-break: break-word;
    }
    .chat-msg .user { color: #e94560; font-weight: bold; }
    .chat-msg .text { color: #ccc; }
    #chat-input-row { display: flex; gap: 6px; }
    #chat-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 6px 8px;
      font-size: 0.8rem;
      font-family: inherit;
      outline: none;
    }
    #chat-input:focus { border-color: #e94560; }
    #chat-send {
      background: #e94560;
      border: none;
      border-radius: 4px;
      color: #fff;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    #chat-send:hover { background: #ff2d55; }

    /* ── Join modal ── */
    #join-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #join-modal.hidden { display: none; }
    .modal-box {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 32px;
      width: 440px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .modal-box h2 {
      color: #e94560;
      font-size: 1.2rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .modal-box label {
      font-size: 0.75rem;
      color: #888;
      display: block;
      margin-bottom: 4px;
    }
    .modal-box input, .modal-box select {
      width: 100%;
      background: #0d0d1a;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }
    .modal-box input:focus { border-color: #e94560; }
    .modal-box button {
      background: #e94560;
      border: none;
      border-radius: 4px;
      color: #fff;
      padding: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .modal-box button:hover { background: #ff2d55; }

    /* Active sessions list in join modal */
    .session-list-section { margin-top: -8px; }
    .session-list-section h3 {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    #active-sessions-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 150px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    .session-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: #0d0d1a;
      border: 1px solid #0f3460;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .session-row:hover { border-color: #e94560; }
    .session-row .session-info { flex: 1; }
    .session-row .session-id-label { color: #e94560; font-weight: bold; }
    .session-row .session-meta { color: #666; font-size: 0.7rem; }

    /* ── Core manager modal ── */
    #core-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #core-modal.hidden { display: none; }
    .core-modal-box {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 24px;
      width: 600px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .core-modal-box h2 {
      color: #e94560;
      font-size: 1.1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .core-tabs {
      display: flex;
      gap: 8px;
    }
    .core-tab {
      background: #0d0d1a;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #888;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
    }
    .core-tab.active { border-color: #e94560; color: #e94560; }
    #core-search {
      width: 100%;
      background: #0d0d1a;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
    }
    #core-search:focus { border-color: #e94560; }
    #core-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 50vh;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    .core-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: #0d0d1a;
      border-radius: 4px;
      font-size: 0.8rem;
    }
    .core-row .core-name { flex: 1; color: #e0e0e0; }
    .core-row .core-status {
      font-size: 0.7rem;
      color: #555;
    }
    .core-row .core-status.installed { color: #00ff88; }
    .core-row .core-status.update { color: #ffa500; }
    .core-row button {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #aaa;
      padding: 4px 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
    }
    .core-row button:hover { border-color: #e94560; color: #e94560; }
    .core-row button.downloading {
      border-color: #ffa500;
      color: #ffa500;
      cursor: wait;
    }
    .core-row button.delete-btn:hover { border-color: #ff4444; color: #ff4444; }
    #core-modal-status {
      font-size: 0.75rem;
      color: #555;
      min-height: 1.2em;
    }
    .core-close-btn {
      background: none;
      border: 1px solid #333;
      border-radius: 4px;
      color: #888;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      align-self: flex-end;
    }
    .core-close-btn:hover { border-color: #e94560; color: #e94560; }

    /* ── Key bindings modal ── */
    #keybind-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #keybind-modal.hidden { display: none; }
    .keybind-modal-box {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 24px;
      width: 420px;
      max-height: 80vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .keybind-modal-box h2 {
      color: #e94560;
      font-size: 1.1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .keybind-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
    }
    .keybind-label {
      width: 80px;
      font-size: 0.85rem;
      color: #aaa;
      text-align: right;
    }
    .keybind-btn {
      flex: 1;
      background: #0d0d1a;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      text-align: center;
    }
    .keybind-btn:hover { border-color: #e94560; }
    .keybind-btn.listening {
      border-color: #ffa500;
      color: #ffa500;
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.5 } }
    .keybind-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
    }
    .keybind-actions button {
      background: none;
      border: 1px solid #333;
      border-radius: 4px;
      color: #888;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
    }
    .keybind-actions button:hover { border-color: #e94560; color: #e94560; }
    .keybind-actions button.primary {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }
    .keybind-actions button.primary:hover { background: #ff2d55; }

    /* ── Reset button (top right of game area) ── */
    #reset-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(26,26,46,0.85);
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #aaa;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      z-index: 10;
      display: none;
    }
    #reset-btn:hover { border-color: #e94560; color: #e94560; }
    #reset-btn.visible { display: block; }

    /* ── Player selector ── */
    #player-selector {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }
    .player-slot-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #666;
      padding: 4px 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
    }
    .player-slot-btn:hover { border-color: #e94560; color: #e94560; }
    .player-slot-btn.active { border-color: #00ff88; color: #00ff88; }
    .player-slot-btn.taken { border-color: #555; color: #444; cursor: not-allowed; }

    /* ── Audio indicator ── */
    #audio-status {
      font-size: 0.7rem;
      color: #555;
      margin-top: 4px;
    }
    #audio-status.playing { color: #00ff88; }
    #audio-status.muted { color: #e94560; }
    #unmute-btn {
      background: #e94560;
      border: none;
      border-radius: 4px;
      color: #fff;
      padding: 4px 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      margin-left: 6px;
      display: none;
    }
    #unmute-btn:hover { background: #ff2d55; }

    /* ── Controls hint ── */
    #controls-hint {
      padding: 6px 12px;
      background: #111;
      border-top: 1px solid #1a1a1a;
      font-size: 0.7rem;
      color: #444;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      cursor: pointer;
    }
    #controls-hint:hover { color: #666; }
    #controls-hint span { color: #666; }
    #controls-hint kbd {
      background: #222;
      border: 1px solid #444;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 0.7rem;
      color: #aaa;
    }

    /* ── Voice ── */
    #voice-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .voice-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #aaa;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: inherit;
    }
    .voice-btn.active { border-color: #00ff88; color: #00ff88; }
    .voice-btn.muted  { border-color: #e94560; color: #e94560; }

    /* ── Gamepad indicator ── */
    #gamepad-indicator {
      font-size: 0.7rem;
      color: #555;
      padding: 2px 0;
    }
    #gamepad-indicator.connected { color: #00ff88; }
  </style>
</head>
<body>

<!-- Core manager modal -->
<div id="core-modal" class="hidden">
  <div class="core-modal-box">
    <h2>Core Manager</h2>
    <div class="core-tabs">
      <button class="core-tab active" data-tab="available">Available</button>
      <button class="core-tab" data-tab="installed">Installed</button>
      <button class="core-tab" data-tab="updates">Updates</button>
    </div>
    <input id="core-search" type="text" placeholder="Search cores..." />
    <div id="core-list"></div>
    <div id="core-modal-status"></div>
    <button class="core-close-btn" id="core-close-btn">Close</button>
  </div>
</div>

<!-- Key bindings modal -->
<div id="keybind-modal" class="hidden">
  <div class="keybind-modal-box">
    <h2>Key Bindings</h2>
    <div id="keybind-list"></div>
    <div class="keybind-actions">
      <button id="keybind-reset">Reset Defaults</button>
      <button id="keybind-close" class="primary">Done</button>
    </div>
  </div>
</div>

<!-- Join modal -->
<div id="join-modal">
  <div class="modal-box">
    <h2>RetroStream</h2>
    <div class="session-list-section">
      <h3>Active Sessions</h3>
      <div id="active-sessions-list">
        <div style="color:#555;font-size:0.8rem;padding:6px;">Loading...</div>
      </div>
    </div>
    <div>
      <label>Username</label>
      <input id="username-input" type="text" placeholder="Player1" value="" />
    </div>
    <div>
      <label>Role</label>
      <select id="role-select">
        <option value="player">Player</option>
        <option value="spectator">Spectator</option>
      </select>
    </div>
    <div style="border-top:1px solid #0f3460;padding-top:12px;margin-top:4px;">
      <label style="color:#e94560;">Create New Session</label>
    </div>
    <div>
      <label>ROM</label>
      <select id="rom-path">
        <option value="">Loading ROMs...</option>
      </select>
    </div>
    <div>
      <label>Core</label>
      <select id="core-path">
        <option value="">Loading cores...</option>
      </select>
    </div>
    <button id="join-btn">Create & Connect</button>
  </div>
</div>

<!-- Header -->
<header>
  <h1>RetroStream</h1>
  <div id="session-badge">No session</div>
  <button class="header-btn" id="cores-btn">Cores</button>
  <button class="header-btn" id="keybind-btn">Controls</button>
  <button id="connection-status" class="disconnected">Disconnected</button>
</header>

<!-- Main content -->
<main>
  <div id="game-area">
    <button id="reset-btn">Reset</button>
    <video id="game-video" autoplay playsinline muted style="display:none;"></video>
    <canvas id="game-canvas" width="256" height="224"></canvas>
    <div id="overlay-message">
      <div>Waiting for game stream...</div>
    </div>
  </div>

  <div id="side-panel">
    <!-- Players -->
    <div class="panel-section">
      <h3>Players</h3>
      <div id="player-list">
        <div class="player-row"><div class="player-dot"></div><span>Waiting...</span></div>
      </div>
      <div id="player-selector"></div>
    </div>

    <!-- Memory watch -->
    <div class="panel-section">
      <h3>Memory Watch</h3>
      <div id="memory-grid">
        <div id="no-memory-msg">No memory map loaded</div>
      </div>
    </div>

    <!-- Voice / Audio -->
    <div class="panel-section">
      <h3>Audio</h3>
      <div id="voice-controls">
        <button class="voice-btn" id="mic-btn">Mic Off</button>
        <button class="voice-btn" id="deafen-btn">Audio On</button>
      </div>
      <div id="audio-status">No game audio</div>
      <button id="unmute-btn">Enable Audio</button>
    </div>

    <!-- Gamepad -->
    <div class="panel-section">
      <h3>Gamepad</h3>
      <div id="gamepad-indicator">No gamepad detected</div>
    </div>

    <!-- Chat -->
    <div id="chat-panel">
      <h3>Chat</h3>
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Say something..." maxlength="200" />
        <button id="chat-send">&rarr;</button>
      </div>
    </div>
  </div>
</main>

<!-- Controls hint (click to open keybind modal) -->
<div id="controls-hint"></div>

<script>
// ============================================================
// RetroStream Client
// ============================================================

const BUTTON = {
  B:      0,  Y:      1,  SELECT: 2,  START:  3,
  UP:     4,  DOWN:   5,  LEFT:   6,  RIGHT:  7,
  A:      8,  X:      9,  L:      10, R:      11,
};

const BUTTON_NAMES = {
  UP: "Up", DOWN: "Down", LEFT: "Left", RIGHT: "Right",
  A: "A", B: "B", X: "X", Y: "Y",
  L: "L", R: "R", START: "Start", SELECT: "Select",
};

// Display-friendly names for key codes
function keyCodeToLabel(code) {
  if (!code) return "—";
  const map = {
    ArrowUp: "\u2191", ArrowDown: "\u2193", ArrowLeft: "\u2190", ArrowRight: "\u2192",
    ShiftLeft: "L-Shift", ShiftRight: "R-Shift", Enter: "Enter",
    Space: "Space", Backspace: "Backspace", Tab: "Tab",
    ControlLeft: "L-Ctrl", ControlRight: "R-Ctrl",
    AltLeft: "L-Alt", AltRight: "R-Alt",
  };
  if (map[code]) return map[code];
  if (code.startsWith("Key")) return code.slice(3);
  if (code.startsWith("Digit")) return code.slice(5);
  if (code.startsWith("Numpad")) return "Num" + code.slice(6);
  return code;
}

// Default key bindings: { buttonName: keyCode }
const DEFAULT_KEY_BINDINGS = {
  UP:     "ArrowUp",
  DOWN:   "ArrowDown",
  LEFT:   "ArrowLeft",
  RIGHT:  "ArrowRight",
  A:      "KeyZ",
  B:      "KeyX",
  X:      "KeyA",
  Y:      "KeyS",
  L:      "KeyQ",
  R:      "KeyW",
  START:  "Enter",
  SELECT: "ShiftLeft",
};

// Load saved bindings or use defaults
function loadKeyBindings() {
  try {
    const saved = localStorage.getItem("retrostream_keybinds");
    if (saved) return JSON.parse(saved);
  } catch (e) {}
  return { ...DEFAULT_KEY_BINDINGS };
}

function saveKeyBindings(bindings) {
  localStorage.setItem("retrostream_keybinds", JSON.stringify(bindings));
}

let keyBindings = loadKeyBindings();

// Build reverse map: keyCode → BUTTON id
function buildKeyMap() {
  const map = {};
  for (const [btnName, keyCode] of Object.entries(keyBindings)) {
    map[keyCode] = BUTTON[btnName];
  }
  return map;
}

let KEY_MAP = buildKeyMap();

// ============================================================
// Session persistence (localStorage)
// ============================================================

function saveSessionState() {
  const data = {
    serverUrl:  state.serverUrl,
    sessionId:  state.sessionId,
    clientId:   state.clientId,
    username:   state.username,
    role:       state.role,
  };
  localStorage.setItem("retrostream_session", JSON.stringify(data));
}

function loadSessionState() {
  try {
    const saved = localStorage.getItem("retrostream_session");
    if (saved) return JSON.parse(saved);
  } catch (e) {}
  return null;
}

function clearSessionState() {
  localStorage.removeItem("retrostream_session");
}

// ============================================================
// Join / Connect
// ============================================================

async function joinSession(sessionId) {
  state.serverUrl = window.location.origin;
  state.username  = $("username-input").value || "Player" + Math.floor(Math.random()*100);
  state.role      = $("role-select").value;

  setStatus("connecting");

  try {
    state.sessionId = sessionId;
    sessionBadge.textContent = `Session: ${sessionId}`;
    $("join-modal").classList.add("hidden");

    await connectWebRTC();
    connectInputWS();
    connectMemoryWS();
    connectChatWS();
    saveSessionState();

  } catch (err) {
    alert("Connection failed: " + err.message);
    setStatus("disconnected");
    $("join-modal").classList.remove("hidden");
    clearSessionState();
  }
}

$("join-btn").addEventListener("click", async () => {
  state.serverUrl = window.location.origin;
  state.username  = $("username-input").value || "Player" + Math.floor(Math.random()*100);
  state.role      = $("role-select").value;

  setStatus("connecting");

  try {
    const core = $("core-path").value;
    const rom  = $("rom-path").value;
    if (!core || !rom) {
      alert("Select a ROM and core to create a new session.");
      setStatus("disconnected"); return;
    }
    const res = await fetch(`${state.serverUrl}/api/sessions`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ core_path: core, rom_path: rom }),
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || "Failed to create session");
    }
    const data = await res.json();
    state.sessionId = data.session_id;
    sessionBadge.textContent = `Session: ${state.sessionId}`;
    $("join-modal").classList.add("hidden");

    await connectWebRTC();
    connectInputWS();
    connectMemoryWS();
    connectChatWS();
    saveSessionState();

  } catch (err) {
    alert("Connection failed: " + err.message);
    setStatus("disconnected");
    $("join-modal").classList.remove("hidden");
    clearSessionState();
  }
});

// ============================================================
// Active sessions list
// ============================================================

async function loadActiveSessions() {
  const list = $("active-sessions-list");
  try {
    const base = window.location.origin;
    const res = await fetch(`${base}/api/sessions`);
    const sessions = await res.json();

    if (sessions.length === 0) {
      list.innerHTML = '<div style="color:#555;font-size:0.8rem;padding:6px;">No active sessions</div>';
      return;
    }

    list.innerHTML = "";
    for (const s of sessions) {
      const row = document.createElement("div");
      row.className = "session-row";
      row.innerHTML = `
        <div class="session-info">
          <span class="session-id-label">${escHtml(s.session_id)}</span>
          <span class="session-meta">${escHtml(s.rom)} &middot; ${s.players}/${s.max_players} players</span>
        </div>
      `;
      row.addEventListener("click", () => joinSession(s.session_id));
      list.appendChild(row);
    }
  } catch (e) {
    list.innerHTML = '<div style="color:#555;font-size:0.8rem;padding:6px;">Could not load sessions</div>';
  }
}

// ============================================================
// WebRTC
// ============================================================

async function connectWebRTC() {
  state.pc = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
  });

  // Video/Audio tracks
  state.pc.ontrack = (e) => {
    if (e.track.kind === "video") {
      video.srcObject = e.streams[0];
      video.play().catch(() => {});
      overlay.style.display = "none";
      $("reset-btn").classList.add("visible");
      renderVideoToCanvas();
    }
    if (e.track.kind === "audio") {
      state.gameAudio = new Audio();
      state.gameAudio.srcObject = e.streams[0];
      state.gameAudio.volume = 1.0;
      // Try to play — may fail due to autoplay policy
      state.gameAudio.play().then(() => {
        updateAudioStatus("playing");
      }).catch((err) => {
        console.warn("Audio autoplay blocked:", err.message);
        updateAudioStatus("blocked");
      });
    }
  };

  state.pc.onconnectionstatechange = () => {
    const s = state.pc.connectionState;
    if (s === "connected") {
      setStatus("connected");
      state.connected = true;
      renderPlayerSelector();
    }
    if (s === "disconnected" ||
        s === "failed" ||
        s === "closed")        { setStatus("disconnected"); state.connected = false; }
  };

  // Create DataChannel for low-latency input (UDP/SCTP, no TCP Nagle)
  state.inputDc = state.pc.createDataChannel("input", {
    ordered: false,
    maxRetransmits: 0,
  });
  state.inputDc.binaryType = "arraybuffer";
  state.inputDc.onopen  = () => console.log("Input DataChannel open");
  state.inputDc.onclose = () => console.log("Input DataChannel closed");

  state.pc.addTransceiver("video", { direction: "recvonly" });
  state.pc.addTransceiver("audio", { direction: "sendrecv" });

  const offer  = await state.pc.createOffer();
  await state.pc.setLocalDescription(offer);

  // Wait for ICE gathering
  await new Promise(resolve => {
    if (state.pc.iceGatheringState === "complete") { resolve(); return; }
    state.pc.onicegatheringstatechange = () => {
      if (state.pc.iceGatheringState === "complete") resolve();
    };
    setTimeout(resolve, 3000);
  });

  const res = await fetch(
    `${state.serverUrl}/rtc/offer/${state.sessionId}`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      sdp:       state.pc.localDescription.sdp,
      type:      state.pc.localDescription.type,
      role:      state.role,
    }),
  });

  if (!res.ok) throw new Error("WebRTC offer rejected: " + res.status);
  const answer = await res.json();

  state.clientId  = answer.client_id;
  state.playerNum = answer.player_num;

  await state.pc.setRemoteDescription(
    new RTCSessionDescription({ sdp: answer.sdp, type: answer.type })
  );

  saveSessionState();
  updatePlayerList();
}

function renderVideoToCanvas() {
  if (video.paused || video.ended) return;
  if (video.videoWidth) {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
  }
  requestAnimationFrame(renderVideoToCanvas);
}

// ============================================================
// Input WebSocket
// ============================================================

function connectInputWS() {
  const wsUrl = state.serverUrl.replace(/^http/, "ws");
  state.inputWs = new WebSocket(`${wsUrl}/ws/input/${state.sessionId}`);
  state.inputWs.onopen  = () => console.log("Input WS connected");
  state.inputWs.onerror = (e) => console.error("Input WS error", e);
  state.inputWs.onclose = () => {
    if (state.connected) setTimeout(connectInputWS, 2000);
  };
}

// Send input over the WebRTC DataChannel (UDP/SCTP — no TCP Nagle lag).
// Falls back to the WebSocket if the DataChannel isn't open yet.
// Coalesces via RAF so at most one message per animation frame.
let _inputDirty = false;
let _inputRafId = 0;
const _inputBuf = new ArrayBuffer(4);
const _inputView = new DataView(_inputBuf);

function _flushInput() {
  _inputRafId = 0;
  _inputDirty = false;
  if (state.role !== "player") return;

  // Prefer DataChannel (unreliable/unordered UDP — lowest latency)
  if (state.inputDc?.readyState === "open") {
    _inputView.setUint16(0, state.buttons, true);
    state.inputDc.send(_inputBuf);
    return;
  }
  // Fallback to WebSocket
  if (state.inputWs?.readyState === WebSocket.OPEN) {
    state.inputWs.send(JSON.stringify({
      client_id: state.clientId,
      buttons:   state.buttons,
    }));
  }
}

function sendInput() {
  _inputDirty = true;
  if (!_inputRafId) {
    _inputRafId = requestAnimationFrame(_flushInput);
  }
}

// ============================================================
// Keyboard input
// ============================================================

const pressedKeys = new Set();

document.addEventListener("keydown", (e) => {
  // Don't capture input when typing in text fields
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;

  const btn = KEY_MAP[e.code];
  if (btn !== undefined && !pressedKeys.has(e.code)) {
    e.preventDefault();
    pressedKeys.add(e.code);
    state.buttons |= (1 << btn);
    sendInput();
  }
});

document.addEventListener("keyup", (e) => {
  const btn = KEY_MAP[e.code];
  if (btn !== undefined) {
    pressedKeys.delete(e.code);
    state.buttons &= ~(1 << btn);
    sendInput();
  }
});

// ============================================================
// Gamepad support
// ============================================================

const GAMEPAD_MAP = [
  [0,  BUTTON.A],   [1, BUTTON.B],
  [2,  BUTTON.X],   [3, BUTTON.Y],
  [4,  BUTTON.L],   [5, BUTTON.R],
  [8,  BUTTON.SELECT], [9, BUTTON.START],
  [12, BUTTON.UP],  [13, BUTTON.DOWN],
  [14, BUTTON.LEFT],[15, BUTTON.RIGHT],
];

let gamepadConnected = false;

function pollGamepad() {
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  let foundPad = false;

  for (const pad of pads) {
    if (!pad) continue;
    foundPad = true;
    let gpButtons = 0;

    for (const [gpIdx, retroBtn] of GAMEPAD_MAP) {
      if (pad.buttons[gpIdx]?.pressed) gpButtons |= (1 << retroBtn);
    }

    // Analog stick -> D-pad (both sticks)
    if (pad.axes[0] < -0.5) gpButtons |= (1 << BUTTON.LEFT);
    if (pad.axes[0] >  0.5) gpButtons |= (1 << BUTTON.RIGHT);
    if (pad.axes[1] < -0.5) gpButtons |= (1 << BUTTON.UP);
    if (pad.axes[1] >  0.5) gpButtons |= (1 << BUTTON.DOWN);
    // Right stick (axes 2,3) as well
    if (pad.axes.length >= 4) {
      if (pad.axes[2] < -0.5) gpButtons |= (1 << BUTTON.LEFT);
      if (pad.axes[2] >  0.5) gpButtons |= (1 << BUTTON.RIGHT);
      if (pad.axes[3] < -0.5) gpButtons |= (1 << BUTTON.UP);
      if (pad.axes[3] >  0.5) gpButtons |= (1 << BUTTON.DOWN);
    }

    if (gpButtons !== state.gamepadButtons) {
      state.gamepadButtons = gpButtons;
      // Merge keyboard + gamepad
      const kbButtons = state.buttons & ~state.gamepadButtons; // keep only pure keyboard bits
      state.buttons = kbButtons | gpButtons;
      sendInput();
    }
    break; // use first gamepad only
  }

  // Update indicator
  if (foundPad !== gamepadConnected) {
    gamepadConnected = foundPad;
    const el = $("gamepad-indicator");
    if (foundPad) {
      const pad = Array.from(pads).find(p => p);
      el.textContent = pad.id.substring(0, 40);
      el.className = "connected";
    } else {
      el.textContent = "No gamepad detected";
      el.className = "";
    }
  }

  requestAnimationFrame(pollGamepad);
}

// Always poll for gamepads (they can connect/disconnect anytime)
requestAnimationFrame(pollGamepad);

// ============================================================
// Memory WebSocket
// ============================================================

function connectMemoryWS() {
  const wsUrl = state.serverUrl.replace(/^http/, "ws");
  state.memoryWs = new WebSocket(`${wsUrl}/ws/memory/${state.sessionId}`);

  state.memoryWs.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === "memory_snapshot") {
      Object.assign(state.memValues, msg.values);
      renderMemory(state.memValues, null);
    } else if (msg.type === "memory_update") {
      Object.assign(state.memValues, msg.changes);
      renderMemory(state.memValues, msg.changes);
    }
  };

  state.memoryWs.onclose = () => {
    if (state.connected) setTimeout(connectMemoryWS, 3000);
  };
}

function renderMemory(values, changed) {
  const grid = $("memory-grid");
  const keys = Object.keys(values);
  if (keys.length === 0) {
    grid.innerHTML = '<div id="no-memory-msg">No memory map loaded</div>';
    return;
  }
  grid.innerHTML = "";
  for (const [k, v] of Object.entries(values)) {
    const cell = document.createElement("div");
    cell.className = "mem-cell";
    const isChanged = changed && k in changed;
    cell.innerHTML = `
      <div class="label">${k}</div>
      <div class="value ${isChanged ? "changed" : ""}">${v}</div>
    `;
    grid.appendChild(cell);
  }
}

// ============================================================
// Chat WebSocket
// ============================================================

function connectChatWS() {
  const wsUrl = state.serverUrl.replace(/^http/, "ws");
  state.chatWs = new WebSocket(`${wsUrl}/ws/chat/${state.sessionId}`);

  state.chatWs.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === "chat") appendChat(msg.username, msg.text);
  };

  state.chatWs.onclose = () => {
    if (state.connected) setTimeout(connectChatWS, 2000);
  };
}

function appendChat(user, text) {
  const div = document.createElement("div");
  div.className = "chat-msg";
  div.innerHTML = `<span class="user">${escHtml(user)}:</span> <span class="text">${escHtml(text)}</span>`;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function sendChat(text) {
  if (!text.trim() || !state.chatWs) return;
  state.chatWs.send(JSON.stringify({ username: state.username, text }));
}

$("chat-send").addEventListener("click", () => {
  sendChat($("chat-input").value);
  $("chat-input").value = "";
});

$("chat-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    sendChat($("chat-input").value);
    $("chat-input").value = "";
  }
});

// ============================================================
// Voice
// ============================================================

$("mic-btn").addEventListener("click", async () => {
  if (!state.micEnabled) {
    try {
      state.micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      state.micStream.getAudioTracks().forEach(track => {
        if (state.pc) state.pc.addTrack(track, state.micStream);
      });
      state.micEnabled = true;
      $("mic-btn").textContent = "Mic On";
      $("mic-btn").classList.add("active");
    } catch (err) {
      alert("Mic access denied: " + err.message);
    }
  } else {
    state.micStream?.getTracks().forEach(t => t.stop());
    state.micEnabled = false;
    $("mic-btn").textContent = "Mic Off";
    $("mic-btn").classList.remove("active");
    $("mic-btn").classList.add("muted");
  }
});

$("deafen-btn").addEventListener("click", () => {
  state.deafened = !state.deafened;
  $("deafen-btn").textContent = state.deafened ? "Audio Off" : "Audio On";
  $("deafen-btn").classList.toggle("muted", state.deafened);
  if (state.gameAudio) {
    state.gameAudio.muted = state.deafened;
    updateAudioStatus(state.deafened ? "muted" : "playing");
  }
});

// ============================================================
// Key bindings UI
// ============================================================

let listeningFor = null; // button name currently being rebound

function renderKeybindList() {
  const list = $("keybind-list");
  list.innerHTML = "";
  const order = ["UP","DOWN","LEFT","RIGHT","A","B","X","Y","L","R","START","SELECT"];
  for (const btnName of order) {
    const row = document.createElement("div");
    row.className = "keybind-row";
    const isListening = listeningFor === btnName;
    row.innerHTML = `
      <span class="keybind-label">${BUTTON_NAMES[btnName]}</span>
      <button class="keybind-btn ${isListening ? 'listening' : ''}"
              data-btn="${btnName}">
        ${isListening ? 'Press a key...' : keyCodeToLabel(keyBindings[btnName])}
      </button>
    `;
    row.querySelector(".keybind-btn").addEventListener("click", () => {
      listeningFor = btnName;
      renderKeybindList();
    });
    list.appendChild(row);
  }
}

function handleKeybindCapture(e) {
  if (!listeningFor) return;
  e.preventDefault();
  e.stopPropagation();

  // Ignore modifier-only presses
  if (["Control","Alt","Meta"].includes(e.key)) return;

  keyBindings[listeningFor] = e.code;
  listeningFor = null;
  saveKeyBindings(keyBindings);
  KEY_MAP = buildKeyMap();
  renderKeybindList();
  updateControlsHint();
}

$("keybind-btn").addEventListener("click", () => {
  listeningFor = null;
  $("keybind-modal").classList.remove("hidden");
  renderKeybindList();
});

$("keybind-close").addEventListener("click", () => {
  listeningFor = null;
  $("keybind-modal").classList.add("hidden");
});

$("keybind-reset").addEventListener("click", () => {
  keyBindings = { ...DEFAULT_KEY_BINDINGS };
  saveKeyBindings(keyBindings);
  KEY_MAP = buildKeyMap();
  listeningFor = null;
  renderKeybindList();
  updateControlsHint();
});

document.addEventListener("keydown", (e) => {
  if (listeningFor) {
    handleKeybindCapture(e);
  }
}, true); // capture phase so it fires before the game input handler

// Click on controls hint also opens keybind modal
$("controls-hint").addEventListener("click", () => {
  listeningFor = null;
  $("keybind-modal").classList.remove("hidden");
  renderKeybindList();
});

// ============================================================
// Helpers
// ============================================================

function setStatus(s) {
  statusEl.className = s;
  statusEl.textContent = s === "connected" ? "Connected \u2022 Disconnect" :
                         s.charAt(0).toUpperCase() + s.slice(1);
}

function disconnectSession() {
  if (!state.connected) return;
  state.connected = false;

  // Cancel any pending input send
  if (_inputRafId) { cancelAnimationFrame(_inputRafId); _inputRafId = 0; }

  // Close DataChannel
  if (state.inputDc) { state.inputDc.close(); state.inputDc = null; }

  // Close all WebSockets
  if (state.inputWs)  { state.inputWs.close();  state.inputWs  = null; }
  if (state.memoryWs) { state.memoryWs.close(); state.memoryWs = null; }
  if (state.chatWs)   { state.chatWs.close();   state.chatWs   = null; }

  // Close WebRTC peer connection
  if (state.pc) { state.pc.close(); state.pc = null; }

  // Stop game audio
  if (state.gameAudio) {
    state.gameAudio.pause();
    state.gameAudio.srcObject = null;
    state.gameAudio = null;
  }

  // Reset video
  video.srcObject = null;
  overlay.style.display = "";
  $("reset-btn").classList.remove("visible");

  setStatus("disconnected");
  clearSessionState();
  $("join-modal").classList.remove("hidden");
}

statusEl.addEventListener("click", () => {
  if (state.connected) disconnectSession();
});

function updatePlayerList() {
  const list = $("player-list");
  list.innerHTML = "";
  const row = document.createElement("div");
  row.className = "player-row";
  row.innerHTML = `
    <div class="player-dot you"></div>
    <span>${escHtml(state.username)} (P${(state.playerNum ?? 0) + 1})</span>
    <span style="margin-left:auto;color:#555;font-size:0.7rem">${state.role}</span>
  `;
  list.appendChild(row);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// ============================================================
// ROM / Core dropdown population
// ============================================================

const EXT_TO_CORES = {
  ".sfc":  ["snes9x", "bsnes"],
  ".smc":  ["snes9x", "bsnes"],
  ".nes":  ["fceumm", "nestopia"],

let _loadedRoms = [];
let _loadedCores = [];

async function populateDropdowns() {
  const base = window.location.origin;
  try {
    const [roms, cores] = await Promise.all([
      fetch(`${base}/api/roms`).then(r => r.json()),
      fetch(`${base}/api/cores/installed`).then(r => r.json()),
    ]);
    _loadedRoms = roms;
    _loadedCores = cores;

    const romSel = $("rom-path");
    romSel.innerHTML = "";
    if (roms.length === 0) {
      romSel.innerHTML = '<option value="">No ROMs found in roms/</option>';
    } else {
      romSel.innerHTML = '<option value="">-- Select a ROM --</option>';
      for (const r of roms) {
        const opt = document.createElement("option");
        opt.value = r.path;
        opt.textContent = r.filename;
        romSel.appendChild(opt);
      }
    }

    populateCoreDropdown(cores);
  } catch (e) {
    console.error("Failed to populate dropdowns:", e);
    $("rom-path").innerHTML = '<option value="">Failed to load ROMs</option>';
    $("core-path").innerHTML = '<option value="">Failed to load cores</option>';
  }
}

function populateCoreDropdown(cores) {
  const coreSel = $("core-path");
  coreSel.innerHTML = "";
  if (cores.length === 0) {
    coreSel.innerHTML = '<option value="">No cores installed (use Cores button)</option>';
  } else {
    coreSel.innerHTML = '<option value="">-- Select a core --</option>';
    for (const c of cores) {
      const opt = document.createElement("option");
      opt.value = c.path;
      opt.textContent = `${c.name} (${c.filename})`;
      coreSel.appendChild(opt);
    }
  }
}

function autoSelectCore() {
  const romPath = $("rom-path").value;
  if (!romPath || _loadedCores.length === 0) return;

  const ext = "." + romPath.split(".").pop().toLowerCase();
  const candidates = EXT_TO_CORES[ext];
  if (!candidates) return;

  for (const candidate of candidates) {
    const match = _loadedCores.find(c =>
      c.name.toLowerCase().includes(candidate.toLowerCase())
    );
    if (match) {
      $("core-path").value = match.path;
      return;
    }
  }
}

$("rom-path").addEventListener("change", autoSelectCore);

// ============================================================
// Core Manager
// ============================================================

const coreState = {
  tab: "available",
  remoteCores: [],
  installedCores: [],
  updates: [],
};

function getCoreServerUrl() {
  return window.location.origin;
}

$("cores-btn").addEventListener("click", () => {
  $("core-modal").classList.remove("hidden");
  switchCoreTab("available");
});

$("core-close-btn").addEventListener("click", () => {
  $("core-modal").classList.add("hidden");
});

document.querySelectorAll(".core-tab").forEach(btn => {
  btn.addEventListener("click", () => switchCoreTab(btn.dataset.tab));
});

function switchCoreTab(tab) {
  coreState.tab = tab;
  document.querySelectorAll(".core-tab").forEach(b => {
    b.classList.toggle("active", b.dataset.tab === tab);
  });
  $("core-search").value = "";
  loadCoreTab();
}

async function loadCoreTab() {
  const list = $("core-list");
  const status = $("core-modal-status");
  list.innerHTML = '<div style="color:#555;padding:12px;">Loading...</div>';
  status.textContent = "";

  const base = getCoreServerUrl();

  try {
    if (coreState.tab === "available") {
      const [remoteRes, installedRes] = await Promise.all([
        fetch(`${base}/api/cores/remote`),
        fetch(`${base}/api/cores/installed`),
      ]);
      coreState.remoteCores = await remoteRes.json();
      coreState.installedCores = await installedRes.json();
      status.textContent = `${coreState.remoteCores.length} cores available`;
      renderCoreList();
    } else if (coreState.tab === "installed") {
      const res = await fetch(`${base}/api/cores/installed`);
      coreState.installedCores = await res.json();
      status.textContent = `${coreState.installedCores.length} cores installed`;
      renderCoreList();
    } else if (coreState.tab === "updates") {
      status.textContent = "Checking for updates...";
      const res = await fetch(`${base}/api/cores/updates`);
      coreState.updates = await res.json();
      status.textContent = coreState.updates.length
        ? `${coreState.updates.length} update(s) available`
        : "All cores are up to date";
      renderCoreList();
    }
  } catch (err) {
    list.innerHTML = `<div style="color:#e94560;padding:12px;">Failed to load: ${escHtml(err.message)}</div>`;
  }
}

$("core-search").addEventListener("input", () => renderCoreList());

function renderCoreList() {
  const list = $("core-list");
  const filter = $("core-search").value.toLowerCase();
  list.innerHTML = "";

  let items = [];
  const installedNames = new Set(coreState.installedCores.map(c => c.name));

  if (coreState.tab === "available") {
    items = coreState.remoteCores.map(c => ({
      name: c.name,
      installed: installedNames.has(c.name),
      hasUpdate: false,
    }));
  } else if (coreState.tab === "installed") {
    items = coreState.installedCores.map(c => ({
      name: c.name,
      filename: c.filename,
      installed: true,
      size: c.size_bytes,
      installedAt: c.installed_at,
      hasUpdate: false,
    }));
  } else if (coreState.tab === "updates") {
    items = coreState.updates.map(c => ({
      name: c.name,
      installed: true,
      hasUpdate: true,
      remoteDate: c.remote_date,
    }));
  }

  if (filter) {
    items = items.filter(c => c.name.toLowerCase().includes(filter));
  }

  if (items.length === 0) {
    list.innerHTML = '<div style="color:#555;padding:12px;font-style:italic;">No cores found</div>';
    return;
  }

  for (const core of items) {
    const row = document.createElement("div");
    row.className = "core-row";

    let statusHtml = "";
    let actionsHtml = "";

    if (coreState.tab === "available") {
      if (core.installed) {
        statusHtml = '<span class="core-status installed">Installed</span>';
        actionsHtml = `<button onclick="coreAction('download','${escHtml(core.name)}',this)">Reinstall</button>`;
      } else {
        actionsHtml = `<button onclick="coreAction('download','${escHtml(core.name)}',this)">Download</button>`;
      }
    } else if (coreState.tab === "installed") {
      const sizeKb = core.size ? (core.size / 1024).toFixed(0) + " KB" : "";
      statusHtml = `<span class="core-status">${sizeKb}</span>`;
      actionsHtml = `
        <button onclick="coreAction('download','${escHtml(core.name)}',this)">Update</button>
        <button class="delete-btn" onclick="coreAction('delete','${escHtml(core.name)}',this)">Delete</button>
      `;
    } else if (coreState.tab === "updates") {
      statusHtml = '<span class="core-status update">Update available</span>';
      actionsHtml = `<button onclick="coreAction('download','${escHtml(core.name)}',this)">Update</button>`;
    }

    row.innerHTML = `
      <span class="core-name">${escHtml(core.name)}</span>
      ${statusHtml}
      ${actionsHtml}
    `;
    list.appendChild(row);
  }
}

async function coreAction(action, name, btn) {
  const base = getCoreServerUrl();
  const origText = btn.textContent;
  btn.textContent = action === "delete" ? "Deleting..." : "Downloading...";
  btn.classList.add("downloading");
  btn.disabled = true;
  const status = $("core-modal-status");

  try {
    if (action === "download") {
      status.textContent = `Downloading ${name}...`;
      const res = await fetch(`${base}/api/cores/download`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ core_name: name }),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || `HTTP ${res.status}`);
      }
      const data = await res.json();
      status.textContent = `Installed ${data.filename} (${(data.size_bytes/1024).toFixed(0)} KB)`;
      btn.textContent = "Done!";
      setTimeout(() => { loadCoreTab(); populateDropdowns(); }, 1000);
    } else if (action === "delete") {
      const res = await fetch(`${base}/api/cores/${encodeURIComponent(name)}`, {
        method: "DELETE",
      });
      if (!res.ok && res.status !== 204) {
        const err = await res.json();
        throw new Error(err.detail || `HTTP ${res.status}`);
      }
      status.textContent = `Deleted ${name}`;
      setTimeout(() => { loadCoreTab(); populateDropdowns(); }, 500);
    }
  } catch (err) {
    status.textContent = `Error: ${err.message}`;
    btn.textContent = origText;
    btn.classList.remove("downloading");
    btn.disabled = false;
  }
}

// ============================================================
// Reset button
// ============================================================

$("reset-btn").addEventListener("click", async () => {
  if (!state.sessionId) return;
  if (!confirm("Reset the game?")) return;
  try {
    await fetch(`${state.serverUrl}/api/sessions/${state.sessionId}/reset`, {
      method: "POST",
    });
  } catch (e) {
    console.error("Reset failed:", e);
  }
});

// ============================================================
// Audio status & unmute
// ============================================================

function updateAudioStatus(status) {
  const el = $("audio-status");
  const btn = $("unmute-btn");
  if (status === "playing") {
    el.textContent = "Game audio playing";
    el.className = "playing";
    btn.style.display = "none";
  } else if (status === "blocked") {
    el.textContent = "Audio blocked by browser";
    el.className = "muted";
    btn.style.display = "inline-block";
  } else if (status === "muted") {
    el.textContent = "Audio muted";
    el.className = "muted";
    btn.style.display = "none";
  } else {
    el.textContent = "No game audio";
    el.className = "";
    btn.style.display = "none";
  }
}

$("unmute-btn").addEventListener("click", () => {
  if (state.gameAudio) {
    state.gameAudio.play().then(() => {
      updateAudioStatus("playing");
    }).catch((err) => {
      console.error("Still can't play audio:", err);
    });
  }
});

// ============================================================
// Player number selector
// ============================================================

function renderPlayerSelector() {
  const el = $("player-selector");
  if (!state.connected || state.role !== "player") {
    el.innerHTML = "";
    return;
  }
  el.innerHTML = "";
  for (let i = 0; i < 4; i++) {
    const btn = document.createElement("button");
    btn.className = "player-slot-btn";
    btn.textContent = `P${i + 1}`;
    if (state.playerNum === i) {
      btn.classList.add("active");
    }
    btn.addEventListener("click", () => switchPlayerSlot(i));
    el.appendChild(btn);
  }
}

async function switchPlayerSlot(num) {
  if (num === state.playerNum) return;
  try {
    const res = await fetch(
      `${state.serverUrl}/api/sessions/${state.sessionId}/player`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ client_id: state.clientId, player_num: num }),
    });
    if (res.ok) {
      state.playerNum = num;
      saveSessionState();
      updatePlayerList();
      renderPlayerSelector();
    } else {
      const err = await res.json();
      console.warn("Can't switch to P" + (num+1) + ": " + err.detail);
    }
  } catch (e) {
    console.error("Player switch failed:", e);
  }
}

// ============================================================
// Startup
// ============================================================

async function init() {
  // Load saved username
  const saved = loadSessionState();
  if (saved?.username) {
    $("username-input").value = saved.username;
  }

  // Populate dropdowns and active sessions list
  await Promise.all([populateDropdowns(), loadActiveSessions()]);

  // Auto-reconnect if we have a saved session
  if (saved?.sessionId) {
    try {
      // Verify session still exists
      const res = await fetch(`${window.location.origin}/api/sessions/${saved.sessionId}`);
      if (res.ok) {
        state.serverUrl = saved.serverUrl || window.location.origin;
        state.username  = saved.username || "Player";
        state.role      = saved.role || "player";
        $("username-input").value = state.username;
        $("role-select").value = state.role;
        await joinSession(saved.sessionId);
        return;
      }
    } catch (e) {
      console.log("Saved session no longer available:", e);
    }
    clearSessionState();
  }
}

init();
