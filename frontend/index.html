<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetroStream</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #1a1a2e;
      border-bottom: 2px solid #e94560;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    header h1 {
      font-size: 1.4rem;
      color: #e94560;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    #session-badge {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.75rem;
      color: #a0a0c0;
    }
    #connection-status {
      margin-left: auto;
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
    }
    #connection-status.connected    { border-color: #00ff88; color: #00ff88; }
    #connection-status.connecting   { border-color: #ffa500; color: #ffa500; }
    #connection-status.disconnected { border-color: #e94560; color: #e94560; }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 260px;
      grid-template-rows: 1fr;
      gap: 0;
      overflow: hidden;
    }

    /* ── Game screen ── */
    #game-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      position: relative;
    }
    #game-canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 2px solid #1a1a2e;
      /* Scale up the tiny retro resolution nicely */
      width: min(80vw, calc(80vh * 1.14));   /* ~256/224 aspect ratio */
      height: auto;
      background: #111;
    }
    #overlay-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #fff;
      font-size: 1.1rem;
    }
    #overlay-message .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Side panel ── */
    #side-panel {
      background: #111;
      border-left: 1px solid #222;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-section {
      border-bottom: 1px solid #222;
      padding: 12px;
    }
    .panel-section h3 {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* Players */
    #player-list { display: flex; flex-direction: column; gap: 4px; }
    .player-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      padding: 4px 6px;
      border-radius: 4px;
      background: #1a1a1a;
    }
    .player-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
    }
    .player-dot.active { background: #00ff88; }
    .player-dot.you    { background: #e94560; }

    /* Memory watch */
    #memory-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .mem-cell {
      background: #1a1a1a;
      border-radius: 4px;
      padding: 6px;
    }
    .mem-cell .label {
      font-size: 0.65rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .mem-cell .value {
      font-size: 1.1rem;
      color: #00ff88;
      font-weight: bold;
    }
    .mem-cell .value.changed {
      color: #ffa500;
      animation: flash 0.4s ease;
    }
    @keyframes flash { 0%,100% { opacity:1 } 50% { opacity:0.3 } }
    #no-memory-msg { font-size: 0.75rem; color: #444; font-style: italic; }

    /* Chat */
    #chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 12px;
    }
    #chat-panel h3 {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    .chat-msg {
      font-size: 0.78rem;
      line-height: 1.4;
      word-break: break-word;
    }
    .chat-msg .user { color: #e94560; font-weight: bold; }
    .chat-msg .text { color: #ccc; }
    #chat-input-row { display: flex; gap: 6px; }
    #chat-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 6px 8px;
      font-size: 0.8rem;
      font-family: inherit;
      outline: none;
    }
    #chat-input:focus { border-color: #e94560; }
    #chat-send {
      background: #e94560;
      border: none;
      border-radius: 4px;
      color: #fff;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    #chat-send:hover { background: #ff2d55; }

    /* ── Join modal ── */
    #join-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #join-modal.hidden { display: none; }
    .modal-box {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 32px;
      width: 380px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .modal-box h2 {
      color: #e94560;
      font-size: 1.2rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .modal-box label {
      font-size: 0.75rem;
      color: #888;
      display: block;
      margin-bottom: 4px;
    }
    .modal-box input, .modal-box select {
      width: 100%;
      background: #0d0d1a;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }
    .modal-box input:focus { border-color: #e94560; }
    .modal-box button {
      background: #e94560;
      border: none;
      border-radius: 4px;
      color: #fff;
      padding: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .modal-box button:hover { background: #ff2d55; }

    /* ── Core manager modal ── */
    #core-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #core-modal.hidden { display: none; }
    .core-modal-box {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 24px;
      width: 600px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .core-modal-box h2 {
      color: #e94560;
      font-size: 1.1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .core-tabs {
      display: flex;
      gap: 8px;
    }
    .core-tab {
      background: #0d0d1a;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #888;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
    }
    .core-tab.active { border-color: #e94560; color: #e94560; }
    #core-search {
      width: 100%;
      background: #0d0d1a;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 8px 10px;
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
    }
    #core-search:focus { border-color: #e94560; }
    #core-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 50vh;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    .core-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: #0d0d1a;
      border-radius: 4px;
      font-size: 0.8rem;
    }
    .core-row .core-name { flex: 1; color: #e0e0e0; }
    .core-row .core-status {
      font-size: 0.7rem;
      color: #555;
    }
    .core-row .core-status.installed { color: #00ff88; }
    .core-row .core-status.update { color: #ffa500; }
    .core-row button {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #aaa;
      padding: 4px 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
    }
    .core-row button:hover { border-color: #e94560; color: #e94560; }
    .core-row button.downloading {
      border-color: #ffa500;
      color: #ffa500;
      cursor: wait;
    }
    .core-row button.delete-btn:hover { border-color: #ff4444; color: #ff4444; }
    #core-modal-status {
      font-size: 0.75rem;
      color: #555;
      min-height: 1.2em;
    }
    .core-close-btn {
      background: none;
      border: 1px solid #333;
      border-radius: 4px;
      color: #888;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      align-self: flex-end;
    }
    .core-close-btn:hover { border-color: #e94560; color: #e94560; }
    #cores-btn {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #a0a0c0;
      padding: 5px 12px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    #cores-btn:hover { border-color: #e94560; color: #e94560; }

    /* ── Controls hint ── */
    #controls-hint {
      padding: 6px 12px;
      background: #111;
      border-top: 1px solid #1a1a1a;
      font-size: 0.7rem;
      color: #444;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    #controls-hint span { color: #666; }
    #controls-hint kbd {
      background: #222;
      border: 1px solid #444;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 0.7rem;
      color: #aaa;
    }

    /* ── Voice ── */
    #voice-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .voice-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #aaa;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: inherit;
    }
    .voice-btn.active { border-color: #00ff88; color: #00ff88; }
    .voice-btn.muted  { border-color: #e94560; color: #e94560; }
  </style>
</head>
<body>

<!-- Core manager modal -->
<div id="core-modal" class="hidden">
  <div class="core-modal-box">
    <h2>Core Manager</h2>
    <div class="core-tabs">
      <button class="core-tab active" data-tab="available">Available</button>
      <button class="core-tab" data-tab="installed">Installed</button>
      <button class="core-tab" data-tab="updates">Updates</button>
    </div>
    <input id="core-search" type="text" placeholder="Search cores..." />
    <div id="core-list"></div>
    <div id="core-modal-status"></div>
    <button class="core-close-btn" id="core-close-btn">Close</button>
  </div>
</div>

<!-- Join modal -->
<div id="join-modal">
  <div class="modal-box">
    <h2>RetroStream</h2>
    <div>
      <label>Server URL</label>
      <input id="server-url" type="text" value="http://localhost:8000" />
    </div>
    <div>
      <label>Session ID</label>
      <input id="session-id-input" type="text" placeholder="Leave blank to create new" />
    </div>
    <div>
      <label>Username</label>
      <input id="username-input" type="text" placeholder="Player1" value="" />
    </div>
    <div>
      <label>Role</label>
      <select id="role-select">
        <option value="player">Player</option>
        <option value="spectator">Spectator</option>
      </select>
    </div>
    <div>
      <label>ROM (for new sessions)</label>
      <select id="rom-path">
        <option value="">Loading ROMs...</option>
      </select>
    </div>
    <div>
      <label>Core (for new sessions)</label>
      <select id="core-path">
        <option value="">Loading cores...</option>
      </select>
    </div>
    <button id="join-btn">Connect</button>
  </div>
</div>

<!-- Header -->
<header>
  <h1>RetroStream</h1>
  <div id="session-badge">No session</div>
  <button id="cores-btn">Cores</button>
  <div id="connection-status" class="disconnected">Disconnected</div>
</header>

<!-- Main content -->
<main>
  <div id="game-area">
    <video id="game-video" autoplay playsinline muted style="display:none;"></video>
    <canvas id="game-canvas" width="256" height="224"></canvas>
    <div id="overlay-message">
      <div>Waiting for game stream...</div>
    </div>
  </div>

  <div id="side-panel">
    <!-- Players -->
    <div class="panel-section">
      <h3>Players</h3>
      <div id="player-list">
        <div class="player-row"><div class="player-dot"></div><span>Waiting...</span></div>
      </div>
    </div>

    <!-- Memory watch -->
    <div class="panel-section">
      <h3>Memory Watch</h3>
      <div id="memory-grid">
        <div id="no-memory-msg">No memory map loaded</div>
      </div>
    </div>

    <!-- Voice -->
    <div class="panel-section">
      <h3>Voice Chat</h3>
      <div id="voice-controls">
        <button class="voice-btn" id="mic-btn">🎤 Mic Off</button>
        <button class="voice-btn" id="deafen-btn">🔊 On</button>
      </div>
    </div>

    <!-- Chat -->
    <div id="chat-panel">
      <h3>Chat</h3>
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Say something..." maxlength="200" />
        <button id="chat-send">→</button>
      </div>
    </div>
  </div>
</main>

<!-- Controls hint -->
<div id="controls-hint">
  <span>D-Pad: <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd></span>
  <span>A: <kbd>Z</kbd>  B: <kbd>X</kbd>  X: <kbd>A</kbd>  Y: <kbd>S</kbd></span>
  <span>L: <kbd>Q</kbd>  R: <kbd>W</kbd></span>
  <span>Start: <kbd>Enter</kbd>  Select: <kbd>Shift</kbd></span>
</div>

<script>
// ============================================================
// RetroStream Client
// ============================================================

const BUTTON = {
  B:      0,  Y:      1,  SELECT: 2,  START:  3,
  UP:     4,  DOWN:   5,  LEFT:   6,  RIGHT:  7,
  A:      8,  X:      9,  L:      10, R:      11,
};

// Keyboard → button mapping
const KEY_MAP = {
  ArrowUp:    BUTTON.UP,    ArrowDown:  BUTTON.DOWN,
  ArrowLeft:  BUTTON.LEFT,  ArrowRight: BUTTON.RIGHT,
  KeyZ:       BUTTON.A,     KeyX:       BUTTON.B,
  KeyA:       BUTTON.X,     KeyS:       BUTTON.Y,
  KeyQ:       BUTTON.L,     KeyW:       BUTTON.R,
  Enter:      BUTTON.START, ShiftLeft:  BUTTON.SELECT,
};

// ── State ──
let state = {
  serverUrl:   "http://localhost:8000",
  sessionId:   null,
  clientId:    null,
  playerNum:   null,
  username:    "Player",
  role:        "player",
  buttons:     0,
  connected:   false,

  pc:          null,   // RTCPeerConnection
  inputWs:     null,   // WebSocket (input)
  memoryWs:    null,   // WebSocket (memory)
  chatWs:      null,   // WebSocket (chat)

  micStream:   null,
  micEnabled:  false,
  deafened:    false,

  memValues:   {},     // last known memory values
};

// ── DOM refs ──
const $ = id => document.getElementById(id);
const video        = $("game-video");
const canvas       = $("game-canvas");
const ctx          = canvas.getContext("2d");
const overlay      = $("overlay-message");
const statusEl     = $("connection-status");
const sessionBadge = $("session-badge");
const chatMessages = $("chat-messages");

// ============================================================
// Join / Connect
// ============================================================

$("join-btn").addEventListener("click", async () => {
  state.serverUrl = $("server-url").value.replace(/\/$/, "");
  state.username  = $("username-input").value || "Player" + Math.floor(Math.random()*100);
  state.role      = $("role-select").value;
  let sessionId   = $("session-id-input").value.trim();

  setStatus("connecting");

  try {
    if (!sessionId) {
      // Create a new session
      const core = $("core-path").value;
      const rom  = $("rom-path").value;
      if (!core || !rom) {
        alert("Select a ROM and core to create a new session.");
        setStatus("disconnected"); return;
      }
      const res = await fetch(`${state.serverUrl}/api/sessions`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ core_path: core, rom_path: rom }),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || "Failed to create session");
      }
      const data = await res.json();
      sessionId = data.session_id;
    }

    state.sessionId = sessionId;
    sessionBadge.textContent = `Session: ${sessionId}`;

    $("join-modal").classList.add("hidden");

    await connectWebRTC();
    connectInputWS();
    connectMemoryWS();
    connectChatWS();

  } catch (err) {
    alert("Connection failed: " + err.message);
    setStatus("disconnected");
    $("join-modal").classList.remove("hidden");
  }
});

// ============================================================
// WebRTC
// ============================================================

async function connectWebRTC() {
  const wsBase = state.serverUrl.replace(/^http/, "ws");

  state.pc = new RTCPeerConnection({
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
  });

  // Video track → canvas
  state.pc.ontrack = (e) => {
    if (e.track.kind === "video") {
      video.srcObject = e.streams[0];
      video.play().catch(() => {});
      overlay.style.display = "none";
      renderVideoToCanvas();
    }
    if (e.track.kind === "audio" && !state.deafened) {
      const audio = new Audio();
      audio.srcObject = e.streams[0];
      audio.play().catch(() => {});
    }
  };

  state.pc.onconnectionstatechange = () => {
    const s = state.pc.connectionState;
    if (s === "connected")     { setStatus("connected"); state.connected = true; }
    if (s === "disconnected" ||
        s === "failed" ||
        s === "closed")        { setStatus("disconnected"); state.connected = false; }
  };

  // Add transceiver for receiving video
  state.pc.addTransceiver("video", { direction: "recvonly" });
  state.pc.addTransceiver("audio", { direction: "sendrecv" });

  const offer  = await state.pc.createOffer();
  await state.pc.setLocalDescription(offer);

  // Wait for ICE gathering
  await new Promise(resolve => {
    if (state.pc.iceGatheringState === "complete") { resolve(); return; }
    state.pc.onicegatheringstatechange = () => {
      if (state.pc.iceGatheringState === "complete") resolve();
    };
    setTimeout(resolve, 3000); // fallback timeout
  });

  const res = await fetch(
    `${state.serverUrl}/rtc/offer/${state.sessionId}`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      sdp:       state.pc.localDescription.sdp,
      type:      state.pc.localDescription.type,
      role:      state.role,
    }),
  });

  if (!res.ok) throw new Error("WebRTC offer rejected: " + res.status);
  const answer = await res.json();

  state.clientId  = answer.client_id;
  state.playerNum = answer.player_num;

  await state.pc.setRemoteDescription(
    new RTCSessionDescription({ sdp: answer.sdp, type: answer.type })
  );

  updatePlayerList();
}

// Draw video track to canvas (preserves pixel-perfect scaling)
function renderVideoToCanvas() {
  if (video.paused || video.ended) return;
  if (video.videoWidth) {
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
  }
  requestAnimationFrame(renderVideoToCanvas);
}

// ============================================================
// Input WebSocket
// ============================================================

function connectInputWS() {
  const wsUrl = state.serverUrl.replace(/^http/, "ws");
  state.inputWs = new WebSocket(`${wsUrl}/ws/input/${state.sessionId}`);
  state.inputWs.onopen  = () => console.log("Input WS connected");
  state.inputWs.onerror = (e) => console.error("Input WS error", e);
  state.inputWs.onclose = () => {
    if (state.connected) setTimeout(connectInputWS, 2000);
  };
}

function sendInput() {
  if (state.inputWs?.readyState === WebSocket.OPEN && state.role === "player") {
    state.inputWs.send(JSON.stringify({
      client_id: state.clientId,
      buttons:   state.buttons,
    }));
  }
}

// Keyboard input
const pressedKeys = new Set();

document.addEventListener("keydown", (e) => {
  if (e.target === $("chat-input") || e.target === $("server-url")) return;
  const btn = KEY_MAP[e.code];
  if (btn !== undefined && !pressedKeys.has(e.code)) {
    pressedKeys.add(e.code);
    state.buttons |= (1 << btn);
    sendInput();
  }
});

document.addEventListener("keyup", (e) => {
  const btn = KEY_MAP[e.code];
  if (btn !== undefined) {
    pressedKeys.delete(e.code);
    state.buttons &= ~(1 << btn);
    sendInput();
  }
});

// Gamepad polling
let gamepadRaf = null;
function pollGamepad() {
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  for (const pad of pads) {
    if (!pad) continue;
    let buttons = 0;
    // Standard mapping (most USB/Bluetooth gamepads)
    const map = [
      [0,  BUTTON.A],   [1, BUTTON.B],
      [2,  BUTTON.X],   [3, BUTTON.Y],
      [4,  BUTTON.L],   [5, BUTTON.R],
      [8,  BUTTON.SELECT], [9, BUTTON.START],
      [12, BUTTON.UP],  [13, BUTTON.DOWN],
      [14, BUTTON.LEFT],[15, BUTTON.RIGHT],
    ];
    for (const [gpIdx, retroBtn] of map) {
      if (pad.buttons[gpIdx]?.pressed) buttons |= (1 << retroBtn);
    }
    // Analog stick → D-pad
    if (pad.axes[0] < -0.5) buttons |= (1 << BUTTON.LEFT);
    if (pad.axes[0] >  0.5) buttons |= (1 << BUTTON.RIGHT);
    if (pad.axes[1] < -0.5) buttons |= (1 << BUTTON.UP);
    if (pad.axes[1] >  0.5) buttons |= (1 << BUTTON.DOWN);

    if (buttons !== state.buttons) {
      state.buttons = buttons;
      sendInput();
    }
    break; // use first gamepad only for P1
  }
  gamepadRaf = requestAnimationFrame(pollGamepad);
}
window.addEventListener("gamepadconnected",    () => pollGamepad());
window.addEventListener("gamepaddisconnected", () => cancelAnimationFrame(gamepadRaf));

// ============================================================
// Memory WebSocket
// ============================================================

function connectMemoryWS() {
  const wsUrl = state.serverUrl.replace(/^http/, "ws");
  state.memoryWs = new WebSocket(`${wsUrl}/ws/memory/${state.sessionId}`);

  state.memoryWs.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === "memory_snapshot") {
      Object.assign(state.memValues, msg.values);
      renderMemory(state.memValues, null);
    } else if (msg.type === "memory_update") {
      Object.assign(state.memValues, msg.changes);
      renderMemory(state.memValues, msg.changes);
    }
  };

  state.memoryWs.onclose = () => {
    if (state.connected) setTimeout(connectMemoryWS, 3000);
  };
}

function renderMemory(values, changed) {
  const grid = $("memory-grid");
  const keys = Object.keys(values);
  if (keys.length === 0) {
    grid.innerHTML = '<div id="no-memory-msg">No memory map loaded</div>';
    return;
  }
  grid.innerHTML = "";
  for (const [k, v] of Object.entries(values)) {
    const cell = document.createElement("div");
    cell.className = "mem-cell";
    const isChanged = changed && k in changed;
    cell.innerHTML = `
      <div class="label">${k}</div>
      <div class="value ${isChanged ? "changed" : ""}">${v}</div>
    `;
    grid.appendChild(cell);
  }
}

// ============================================================
// Chat WebSocket
// ============================================================

function connectChatWS() {
  const wsUrl = state.serverUrl.replace(/^http/, "ws");
  state.chatWs = new WebSocket(`${wsUrl}/ws/chat/${state.sessionId}`);

  state.chatWs.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === "chat") appendChat(msg.username, msg.text);
  };

  state.chatWs.onclose = () => {
    if (state.connected) setTimeout(connectChatWS, 2000);
  };
}

function appendChat(user, text) {
  const div = document.createElement("div");
  div.className = "chat-msg";
  div.innerHTML = `<span class="user">${escHtml(user)}:</span> <span class="text">${escHtml(text)}</span>`;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function sendChat(text) {
  if (!text.trim() || !state.chatWs) return;
  state.chatWs.send(JSON.stringify({ username: state.username, text }));
}

$("chat-send").addEventListener("click", () => {
  sendChat($("chat-input").value);
  $("chat-input").value = "";
});

$("chat-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    sendChat($("chat-input").value);
    $("chat-input").value = "";
  }
});

// ============================================================
// Voice
// ============================================================

$("mic-btn").addEventListener("click", async () => {
  if (!state.micEnabled) {
    try {
      state.micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      state.micStream.getAudioTracks().forEach(track => {
        if (state.pc) state.pc.addTrack(track, state.micStream);
      });
      state.micEnabled = true;
      $("mic-btn").textContent = "🎤 Mic On";
      $("mic-btn").classList.add("active");
    } catch (err) {
      alert("Mic access denied: " + err.message);
    }
  } else {
    state.micStream?.getTracks().forEach(t => t.stop());
    state.micEnabled = false;
    $("mic-btn").textContent = "🎤 Mic Off";
    $("mic-btn").classList.remove("active");
    $("mic-btn").classList.add("muted");
  }
});

$("deafen-btn").addEventListener("click", () => {
  state.deafened = !state.deafened;
  $("deafen-btn").textContent = state.deafened ? "🔇 Deafened" : "🔊 On";
  $("deafen-btn").classList.toggle("muted", state.deafened);
});

// Helpers

function setStatus(s) {
  statusEl.className = s;
  statusEl.textContent = s.charAt(0).toUpperCase() + s.slice(1);
}

function updatePlayerList() {
  const list = $("player-list");
  list.innerHTML = "";
  const row = document.createElement("div");
  row.className = "player-row";
  const isYou = true;
  row.innerHTML = `
    <div class="player-dot ${isYou ? "you" : "active"}"></div>
    <span>${state.username} (P${(state.playerNum ?? 0) + 1})</span>
    <span style="margin-left:auto;color:#555;font-size:0.7rem">${state.role}</span>
  `;
  list.appendChild(row);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// ============================================================
// ROM / Core dropdown population
// ============================================================

// Map ROM file extensions to likely core name substrings (best match first)
const EXT_TO_CORES = {
  ".sfc":  ["snes9x", "bsnes", "mesen-s"],
  ".smc":  ["snes9x", "bsnes", "mesen-s"],
  ".nes":  ["mesen", "nestopia", "fceumm"],
  ".gb":   ["gambatte", "mgba", "sameboy"],
  ".gbc":  ["gambatte", "mgba", "sameboy"],
  ".gba":  ["mgba", "vba_next", "gpsp"],
  ".n64":  ["mupen64plus_next", "mupen64plus", "parallel_n64"],
  ".z64":  ["mupen64plus_next", "mupen64plus", "parallel_n64"],
  ".v64":  ["mupen64plus_next", "mupen64plus", "parallel_n64"],
  ".gen":  ["genesis_plus_gx", "picodrive", "blastem"],
  ".md":   ["genesis_plus_gx", "picodrive", "blastem"],
  ".smd":  ["genesis_plus_gx", "picodrive", "blastem"],
  ".sms":  ["genesis_plus_gx", "picodrive"],
  ".gg":   ["genesis_plus_gx", "gearsystem"],
  ".pce":  ["mednafen_pce", "beetle_pce"],
  ".a26":  ["stella"],
  ".a78":  ["prosystem"],
  ".lnx":  ["handy", "mednafen_lynx"],
  ".ngp":  ["mednafen_ngp", "beetle_ngp"],
  ".ngc":  ["mednafen_ngp", "beetle_ngp"],
  ".ws":   ["mednafen_wswan", "beetle_wswan"],
  ".wsc":  ["mednafen_wswan", "beetle_wswan"],
  ".nds":  ["desmume", "melonds"],
  ".3ds":  ["citra"],
  ".iso":  ["mednafen_psx", "beetle_psx", "pcsx_rearmed", "dolphin"],
  ".bin":  ["mednafen_psx", "beetle_psx", "pcsx_rearmed", "genesis_plus_gx"],
  ".cue":  ["mednafen_psx", "beetle_psx", "pcsx_rearmed"],
  ".chd":  ["mednafen_psx", "beetle_psx", "pcsx_rearmed"],
  ".pbp":  ["ppsspp"],
  ".cso":  ["ppsspp"],
  ".vb":   ["mednafen_vb", "beetle_vb"],
};

let _loadedRoms = [];
let _loadedCores = [];

async function populateDropdowns() {
  const base = ($("server-url").value || "http://localhost:8000").replace(/\/$/, "");
  try {
    const [roms, cores] = await Promise.all([
      fetch(`${base}/api/roms`).then(r => r.json()),
      fetch(`${base}/api/cores/installed`).then(r => r.json()),
    ]);
    _loadedRoms = roms;
    _loadedCores = cores;

    // Populate ROM dropdown
    const romSel = $("rom-path");
    romSel.innerHTML = "";
    if (roms.length === 0) {
      romSel.innerHTML = '<option value="">No ROMs found in roms/</option>';
    } else {
      romSel.innerHTML = '<option value="">-- Select a ROM --</option>';
      for (const r of roms) {
        const opt = document.createElement("option");
        opt.value = r.path;
        opt.textContent = r.filename;
        romSel.appendChild(opt);
      }
    }

    // Populate core dropdown
    populateCoreDropdown(cores);

  } catch (e) {
    console.error("Failed to populate dropdowns:", e);
    $("rom-path").innerHTML = '<option value="">Failed to load ROMs</option>';
    $("core-path").innerHTML = '<option value="">Failed to load cores</option>';
  }
}

function populateCoreDropdown(cores) {
  const coreSel = $("core-path");
  coreSel.innerHTML = "";
  if (cores.length === 0) {
    coreSel.innerHTML = '<option value="">No cores installed (use Cores button)</option>';
  } else {
    coreSel.innerHTML = '<option value="">-- Select a core --</option>';
    for (const c of cores) {
      const opt = document.createElement("option");
      opt.value = c.path;
      opt.textContent = `${c.name} (${c.filename})`;
      coreSel.appendChild(opt);
    }
  }
}

function autoSelectCore() {
  const romPath = $("rom-path").value;
  if (!romPath || _loadedCores.length === 0) return;

  const ext = "." + romPath.split(".").pop().toLowerCase();
  const candidates = EXT_TO_CORES[ext];
  if (!candidates) return;

  // Find the best matching installed core
  for (const candidate of candidates) {
    const match = _loadedCores.find(c =>
      c.name.toLowerCase().includes(candidate.toLowerCase())
    );
    if (match) {
      $("core-path").value = match.path;
      return;
    }
  }
}

$("rom-path").addEventListener("change", autoSelectCore);

// Re-populate when server URL changes
$("server-url").addEventListener("change", populateDropdowns);

// Load on startup
populateDropdowns();

// ============================================================
// Core Manager
// ============================================================

const coreState = {
  tab: "available",
  remoteCores: [],
  installedCores: [],
  updates: [],
  loading: false,
};

function getCoreServerUrl() {
  return ($("server-url").value || "http://localhost:8000").replace(/\/$/, "");
}

$("cores-btn").addEventListener("click", () => {
  $("core-modal").classList.remove("hidden");
  switchCoreTab("available");
});

$("core-close-btn").addEventListener("click", () => {
  $("core-modal").classList.add("hidden");
});

// Tab switching
document.querySelectorAll(".core-tab").forEach(btn => {
  btn.addEventListener("click", () => switchCoreTab(btn.dataset.tab));
});

function switchCoreTab(tab) {
  coreState.tab = tab;
  document.querySelectorAll(".core-tab").forEach(b => {
    b.classList.toggle("active", b.dataset.tab === tab);
  });
  $("core-search").value = "";
  loadCoreTab();
}

async function loadCoreTab() {
  const list = $("core-list");
  const status = $("core-modal-status");
  list.innerHTML = '<div style="color:#555;padding:12px;">Loading...</div>';
  status.textContent = "";

  const base = getCoreServerUrl();

  try {
    if (coreState.tab === "available") {
      // Fetch both remote and installed to show status
      const [remoteRes, installedRes] = await Promise.all([
        fetch(`${base}/api/cores/remote`),
        fetch(`${base}/api/cores/installed`),
      ]);
      coreState.remoteCores = await remoteRes.json();
      coreState.installedCores = await installedRes.json();
      status.textContent = `${coreState.remoteCores.length} cores available`;
      renderCoreList();
    } else if (coreState.tab === "installed") {
      const res = await fetch(`${base}/api/cores/installed`);
      coreState.installedCores = await res.json();
      status.textContent = `${coreState.installedCores.length} cores installed`;
      renderCoreList();
    } else if (coreState.tab === "updates") {
      status.textContent = "Checking for updates...";
      const res = await fetch(`${base}/api/cores/updates`);
      coreState.updates = await res.json();
      status.textContent = coreState.updates.length
        ? `${coreState.updates.length} update(s) available`
        : "All cores are up to date";
      renderCoreList();
    }
  } catch (err) {
    list.innerHTML = `<div style="color:#e94560;padding:12px;">Failed to load: ${escHtml(err.message)}</div>`;
  }
}

$("core-search").addEventListener("input", () => renderCoreList());

function renderCoreList() {
  const list = $("core-list");
  const filter = $("core-search").value.toLowerCase();
  list.innerHTML = "";

  let items = [];
  const installedNames = new Set(coreState.installedCores.map(c => c.name));

  if (coreState.tab === "available") {
    items = coreState.remoteCores.map(c => ({
      name: c.name,
      installed: installedNames.has(c.name),
      hasUpdate: false,
    }));
  } else if (coreState.tab === "installed") {
    items = coreState.installedCores.map(c => ({
      name: c.name,
      filename: c.filename,
      installed: true,
      size: c.size_bytes,
      installedAt: c.installed_at,
      hasUpdate: false,
    }));
  } else if (coreState.tab === "updates") {
    items = coreState.updates.map(c => ({
      name: c.name,
      installed: true,
      hasUpdate: true,
      remoteDate: c.remote_date,
    }));
  }

  if (filter) {
    items = items.filter(c => c.name.toLowerCase().includes(filter));
  }

  if (items.length === 0) {
    list.innerHTML = '<div style="color:#555;padding:12px;font-style:italic;">No cores found</div>';
    return;
  }

  for (const core of items) {
    const row = document.createElement("div");
    row.className = "core-row";

    let statusHtml = "";
    let actionsHtml = "";

    if (coreState.tab === "available") {
      if (core.installed) {
        statusHtml = '<span class="core-status installed">Installed</span>';
        actionsHtml = `<button onclick="coreAction('download','${escHtml(core.name)}',this)">Reinstall</button>`;
      } else {
        actionsHtml = `<button onclick="coreAction('download','${escHtml(core.name)}',this)">Download</button>`;
      }
    } else if (coreState.tab === "installed") {
      const sizeKb = core.size ? (core.size / 1024).toFixed(0) + " KB" : "";
      statusHtml = `<span class="core-status">${sizeKb}</span>`;
      actionsHtml = `
        <button onclick="coreAction('download','${escHtml(core.name)}',this)">Update</button>
        <button class="delete-btn" onclick="coreAction('delete','${escHtml(core.name)}',this)">Delete</button>
      `;
    } else if (coreState.tab === "updates") {
      statusHtml = '<span class="core-status update">Update available</span>';
      actionsHtml = `<button onclick="coreAction('download','${escHtml(core.name)}',this)">Update</button>`;
    }

    row.innerHTML = `
      <span class="core-name">${escHtml(core.name)}</span>
      ${statusHtml}
      ${actionsHtml}
    `;
    list.appendChild(row);
  }
}

async function coreAction(action, name, btn) {
  const base = getCoreServerUrl();
  const origText = btn.textContent;
  btn.textContent = action === "delete" ? "Deleting..." : "Downloading...";
  btn.classList.add("downloading");
  btn.disabled = true;
  const status = $("core-modal-status");

  try {
    if (action === "download") {
      status.textContent = `Downloading ${name}...`;
      const res = await fetch(`${base}/api/cores/download`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ core_name: name }),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || `HTTP ${res.status}`);
      }
      const data = await res.json();
      status.textContent = `Installed ${data.filename} (${(data.size_bytes/1024).toFixed(0)} KB)`;
      btn.textContent = "Done!";
      setTimeout(() => { loadCoreTab(); populateDropdowns(); }, 1000);
    } else if (action === "delete") {
      const res = await fetch(`${base}/api/cores/${encodeURIComponent(name)}`, {
        method: "DELETE",
      });
      if (!res.ok && res.status !== 204) {
        const err = await res.json();
        throw new Error(err.detail || `HTTP ${res.status}`);
      }
      status.textContent = `Deleted ${name}`;
      setTimeout(() => { loadCoreTab(); populateDropdowns(); }, 500);
    }
  } catch (err) {
    status.textContent = `Error: ${err.message}`;
    btn.textContent = origText;
    btn.classList.remove("downloading");
    btn.disabled = false;
  }
}
